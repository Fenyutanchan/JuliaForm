name: CI

on:
  push:
    branches:
      - main
    # GitHub ref filters are globs, not regular expressions. This excludes
    # suffixes and non-numeric components; preflight also rejects leading zeros.
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

# Supersede only pull-request validation. Main and tag runs can reach a release
# job, so a newer run must never cancel them halfway through publication.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions: {}
    outputs:
      can_test: ${{ steps.scope.outputs.can_test }}

    steps:
      - name: Validate event scope
        id: scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail

          can_test=true
          if [[ "${EVENT_NAME}" == "pull_request" ]] &&
             [[ "${HEAD_REPOSITORY}" != "${REPOSITORY}" ]]; then
            can_test=false
            echo "::notice title=Untrusted pull request::Wolfram tests require a repository secret. A maintainer must validate this commit from a branch in the base repository."
          fi

          if [[ "${REF_TYPE}" == "tag" ]] &&
             [[ ! "${REF_NAME}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error title=Invalid release tag::Stable tags must use canonical vMAJOR.MINOR.PATCH SemVer without leading zeros: ${REF_NAME}"
            exit 1
          fi

          echo "can_test=${can_test}" >> "${GITHUB_OUTPUT}"

  repository-config:
    name: Repository config
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate workflows and repository configuration
        shell: bash
        run: bash .github/scripts/check-repository-config.sh

  test:
    name: Wolfram 15.0 / Julia ${{ matrix.julia-channel }}
    needs:
      - preflight
      - repository-config
    if: >-
      needs.preflight.outputs.can_test == 'true' &&
      needs.repository-config.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - julia-channel: lts
            julia-version: lts
          - julia-channel: latest
            julia-version: '1'
    container:
      image: wolframresearch/wolframengine:15.0.0@sha256:3ac08d6aaa33e6dccdda38d14cf8a7e5c22cc84d037a1a7562900914a487ef65
      options: --user root

    steps:
      - name: Require Wolfram entitlement
        shell: bash
        env:
          WOLFRAMSCRIPT_ENTITLEMENTID: >-
            ${{ secrets.WOLFRAMSCRIPT_ENTITLEMENTID }}
        run: |
          if [[ -z "${WOLFRAMSCRIPT_ENTITLEMENTID:-}" ]]; then
            echo "::error title=Missing Wolfram entitlement::Configure the WOLFRAMSCRIPT_ENTITLEMENTID repository secret."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Julia
        uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3.0.2
        with:
          version: ${{ matrix.julia-version }}
          show-versioninfo: 'true'

      - name: Run Wolfram tests
        shell: bash
        env:
          WOLFRAMSCRIPT_ENTITLEMENTID: >-
            ${{ secrets.WOLFRAMSCRIPT_ENTITLEMENTID }}
        run: wolframscript -file Tests/RunTests.wls

      - name: Validate generated Julia
        shell: bash
        env:
          WOLFRAMSCRIPT_ENTITLEMENTID: >-
            ${{ secrets.WOLFRAMSCRIPT_ENTITLEMENTID }}
        run: |
          set -o pipefail
          wolframscript -file Tests/JuliaValidation.wls |
            julia --startup-file=no --check-bounds=yes Tests/JuliaValidation.jl

      - name: Build paclet
        if: matrix.julia-channel == 'latest'
        shell: bash
        env:
          WOLFRAMSCRIPT_ENTITLEMENTID: >-
            ${{ secrets.WOLFRAMSCRIPT_ENTITLEMENTID }}
        run: wolframscript -file Scripts/BuildPaclet.wls

      - name: Validate built paclet
        if: matrix.julia-channel == 'latest'
        shell: bash
        env:
          WOLFRAMSCRIPT_ENTITLEMENTID: >-
            ${{ secrets.WOLFRAMSCRIPT_ENTITLEMENTID }}
        run: wolframscript -file Tests/ValidatePacletArtifact.wls

      - name: Upload paclet artifact
        if: matrix.julia-channel == 'latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: JuliaForm-paclet
          path: dist/*.paclet
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  ci-summary:
    name: CI summary
    needs:
      - preflight
      - repository-config
      - test
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions: {}

    steps:
      - name: Require all validation to pass
        shell: bash
        env:
          CAN_TEST: ${{ needs.preflight.outputs.can_test }}
          PREFLIGHT_RESULT: ${{ needs.preflight.result }}
          REPOSITORY_CONFIG_RESULT: ${{ needs.repository-config.result }}
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          set -euo pipefail

          if [[ "${PREFLIGHT_RESULT}" != "success" ]]; then
            echo "::error title=Preflight failed::Preflight result was ${PREFLIGHT_RESULT}."
            exit 1
          fi

          if [[ "${REPOSITORY_CONFIG_RESULT}" != "success" ]]; then
            echo "::error title=Repository configuration failed::Repository config result was ${REPOSITORY_CONFIG_RESULT}."
            exit 1
          fi

          if [[ "${CAN_TEST}" != "true" ]]; then
            echo "::error title=Validation required::This pull request cannot receive the Wolfram entitlement secret. A maintainer must validate the commit from a base-repository branch."
            exit 1
          fi

          if [[ "${TEST_RESULT}" != "success" ]]; then
            echo "::error title=Test matrix failed::Test result was ${TEST_RESULT}."
            exit 1
          fi

          echo "All required validation, including the built-paclet check, passed."

  publish-dev:
    name: Publish paclet to dev
    needs:
      - test
      - ci-summary
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
      contents: write
      deployments: write
    concurrency:
      group: publish-dev-${{ github.repository }}
      cancel-in-progress: false
    environment:
      name: dev
      url: ${{ github.server_url }}/${{ github.repository }}/releases/tag/dev

    steps:
      - name: Check out release tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
          sparse-checkout: .github/scripts

      - name: Download paclet artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: JuliaForm-paclet
          path: dist

      - name: Publish rolling dev prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: bash .github/scripts/publish-paclet.sh dev dist

  publish-release:
    name: Publish versioned release
    needs:
      - test
      - ci-summary
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
      contents: write
      deployments: write
    concurrency:
      group: publish-release-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false
    environment:
      name: release
      url: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}

    steps:
      - name: Check out release tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
          sparse-checkout: .github/scripts

      - name: Download paclet artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: JuliaForm-paclet
          path: dist

      - name: Publish protected versioned release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: >-
          bash .github/scripts/publish-paclet.sh
          release dist "${GITHUB_REF_NAME}"
