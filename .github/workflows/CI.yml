name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Wolfram 15.0 / Julia ${{ matrix.julia-version }}
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        julia-version:
          - lts
          - '1'

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare private Wolfram runtime
        shell: bash
        env:
          WOLFRAM_RUNTIME_IMAGE: ${{ secrets.WOLFRAM_RUNTIME_IMAGE }}
        run: bash .github/scripts/wolfram-runtime.sh prepare

      - name: Set up Julia
        uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3.0.2
        with:
          version: ${{ matrix.julia-version }}

      - name: Run Wolfram tests
        shell: bash
        run: >-
          bash .github/scripts/wolfram-runtime.sh run
          wolframscript -file Tests/RunTests.wls

      - name: Validate generated Julia
        shell: bash
        run: |
          set -euo pipefail
          bash .github/scripts/wolfram-runtime.sh run \
            /bin/sh -c \
            'mkdir -p dist && wolframscript -file Tests/JuliaValidation.wls > dist/JuliaValidation.out'
          julia --startup-file=no --check-bounds=yes \
            Tests/JuliaValidation.jl dist/JuliaValidation.out

      - name: Build paclet
        if: matrix.julia-version == '1'
        shell: bash
        run: >-
          bash .github/scripts/wolfram-runtime.sh run
          wolframscript -file Scripts/BuildPaclet.wls

      - name: Validate built paclet
        if: matrix.julia-version == '1'
        shell: bash
        run: >-
          bash .github/scripts/wolfram-runtime.sh run
          wolframscript -file Tests/ValidatePacletArtifact.wls

      - name: Upload paclet artifact
        if: matrix.julia-version == '1'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: JuliaForm-paclet
          path: dist/*.paclet
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  publish-dev:
    name: Publish paclet to dev
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    environment:
      name: dev
      url: ${{ github.server_url }}/${{ github.repository }}/releases/tag/dev

    steps:
      - name: Check out release tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download paclet artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: JuliaForm-paclet
          path: dist

      - name: Publish rolling dev prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: bash .github/scripts/publish-paclet.sh dev dist

  publish-release:
    name: Publish versioned release
    needs: test
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    environment:
      name: release
      url: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}

    steps:
      - name: Check out release tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download paclet artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: JuliaForm-paclet
          path: dist

      - name: Publish protected versioned release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: >-
          bash .github/scripts/publish-paclet.sh
          release dist "${GITHUB_REF_NAME}"
