version: 2
# Keep immutable GitHub Action commit pins and their version comments current.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: Asia/Shanghai
    groups:
      github-actions:
        patterns:
          - '*'
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
